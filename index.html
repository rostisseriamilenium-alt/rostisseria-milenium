<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rostisseria Milenium</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="contenedor">

<header>

<h1>🍗 ROSTISSERIA MILENIUM</h1>

</header>

<!-- STOCK -->

<section class="stock">

<h2>QUEDAN</h2>

<div id="quedan" class="numeroGrande">0</div>

<div class="stockBotones">

<input
id="stockInicial"
type="number"
placeholder="Stock inicial">

<button onclick="iniciarStock()">
Iniciar
</button>

<input
id="stockExtra"
type="number"
placeholder="+ Retén">

<button onclick="añadirStock()">
+ Stock
</button>

</div>

</section>

<!-- TIPO DE VENTA -->

<section class="tipoVenta">

<button
id="btnSin"
class="activo"
onclick="seleccionarTipo('sin')">

🟢 SIN ENCARGO

</button>

<button
id="btnCon"
onclick="seleccionarTipo('con')">

🟠 CON ENCARGO

</button>

</section>

<!-- PACKS -->

<section class="packs">

<button class="pack" onclick="pack1()">

📦 PACK 1

<small>1/2 Pollo + 1/2 Caliu</small>

</button>

<button class="pack" onclick="pack2()">

📦 PACK 2

<small>Pollo + Pan + Patatas</small>

</button>

<button class="pack" onclick="pack3()">

📦 PACK 3

<small>Pollo + Pan + Patatas + Canelón</small>

</button>

</section>

<!-- SELECCIÓN PATATAS -->

<section
id="selectorPatatas"
class="selectorPatatas"
style="display:none;">

<h2>ELIGE LAS PATATAS</h2>

<button onclick="patataSeleccionada('caliu')">

🥔 CALIU

</button>

<button onclick="patataSeleccionada('bravas')">

🍟 BRAVAS

</button>

<button onclick="patataSeleccionada('fritas')">

🍟 FRITAS

</button>

</section>

<!-- PRODUCTOS -->

<section class="productos">

<button onclick="venderPollo()">

🍗 POLLO ENTERO

</button>

<button onclick="venderMedioPollo()">

🍗 1/2 POLLO

</button>

<button onclick="venderPan()">

🥖 BARRA PAN

</button>

<button onclick="venderCanelon()">

🥟 CANELÓN

</button>

<button onclick="venderCaliu()">

🥔 CALIU

</button>

<button onclick="venderBravas()">

🍟 BRAVAS

</button>

<button onclick="venderFritas()">

🍟 FRITAS

</button>

</section>

<!-- RESUMEN -->

<section class="resumen">

<h2>📊 RESUMEN</h2>

<div class="resumenGrid">

<div>🍗 Pollos enteros <span id="pollosEnteros">0</span></div>

<div>🍗 Medios pollos <span id="mediosPollos">0</span></div>

<div>🥖 Barras pan <span id="pan">0</span></div>

<div>🥟 Canelones <span id="canelones">0</span></div>

<div>🥔 Caliu <span id="caliu">0</span></div>

<div>🍟 Bravas <span id="bravas">0</span></div>

<div>🍟 Fritas <span id="fritas">0</span></div>

<div>📞 Sin encargo <span id="sinEncargo">0</span></div>

<div>☎️ Con encargo <span id="conEncargo">0</span></div>

</div>

</section>

<!-- BOTONES -->

<section class="acciones">

<button onclick="deshacer()">

↩ DESHACER

</button>

<button onclick="cerrarDia()">
📋 CERRAR DÍA
</button>


</section>
  <div id="pantallaResumen" class="pantallaResumen" style="display:none;">

<div class="resumenCaja">

<h2>📋 CIERRE DEL DÍA</h2>

<div id="contenidoResumen"></div>

<button onclick="guardarResumen()">
💾 Guardar
</button>

<button onclick="window.print()">
🖨️ Imprimir
</button>

<button onclick="reiniciar()">
🔄 Reiniciar día
</button>

<button onclick="cerrarResumen()">
❌ Volver
</button>

</div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
